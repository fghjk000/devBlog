<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS 챗봇</title>
    <style>
        body {
            margin: 0;
            padding: 0;
        }

        .chatbot-container {
            width: 100%;
            max-width: 400px;
            background-color: #FFFFFF;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background-color: #3498DB;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }

        .chat-window {
            padding: 15px;
            height: 400px;
            overflow-y: auto;
            background-color: #F7F7F7;
        }

        .chat-window .response {
            margin-bottom: 15px;
        }

        .chat-window .response.user {
            text-align: right;
        }

        .chat-window .response.user p {
            display: inline-block;
            background-color: #3498DB;
            color: white;
            padding: 10px 15px;
            border-radius: 20px;
            max-width: 70%;
        }

        .chat-window .response.bot p {
            display: inline-block;
            background-color: #E5E5EA;
            color: #000;
            padding: 10px 15px;
            border-radius: 20px;
            max-width: 70%;
        }

        .chat-input {
            display: flex;
            padding: 10px;
            background-color: #FFFFFF;
            border-top: 1px solid #DDD;
        }

        .chat-input input[type="text"] {
            flex: 1;
            padding: 10px;
            border: 1px solid #DDD;
            border-radius: 20px;
            font-size: 14px;
            margin-right: 10px;
        }

        .chat-input button {
            background-color: #3498DB;
            color: white;
            border: none;
            border-radius: 20px;
            padding: 10px 20px;
            font-size: 14px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .chat-input button:hover {
            background-color: #2980B9;
        }

        .suggestions {
            margin-top: 10px;
            padding: 15px;
            background-color: #FFFFFF;
            border-top: 1px solid #DDD;
        }

        .suggestions h3 {
            margin: 0 0 10px 0;
            font-size: 16px;
            color: #333;
        }

        .suggestions ul {
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .suggestions li {
            padding: 10px;
            border-radius: 10px;
            background-color: #F3F4F6;
            margin-bottom: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .suggestions li:hover {
            background-color: #DCE6F1;
        }
    </style>
</head>

<body>
    <div class="chatbot-container">
        <div class="header">Hs 챗봇</div>
        <div class="chat-window">
            {% if answer %}
            <div class="response bot">
                <p>{{ answer|safe }}</p>
            </div>
            {% endif %}
            {% if suggestions %}
            <div class="suggestions">
                <h3>추천 질문:</h3>
                <ul>
                    {% for suggestion in suggestions %}
                    <li onclick="getAnswerFromSuggestion('{{ suggestion }}')">{{ suggestion }}</li>
                    {% endfor %}
                </ul>
            </div>
            {% endif %}
        </div>
        <div class="chat-input">
            <form action="/chatbot/" method="post" style="display: flex; width: 100%;">
                <input type="text" id="query" name="query" value="{{ query }}" placeholder="여기에 질문을 입력하세요..." required>
                <button type="submit">전송</button>
            </form>
        </div>
    </div>
    <script>
        function getAnswerFromSuggestion(suggestion) {
            fetch('/chatbot/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: 'query=' + encodeURIComponent(suggestion)
            })
                .then(response => response.text())
                .then(html => {
                    document.open();
                    document.write(html);
                    document.close();
                })
                .catch(error => console.error('Error:', error));
        }
    </script>
</body>

</html>
