<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게시글 상세보기</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900">

<!-- 네비게이션 바 -->
<nav class="bg-white shadow-md">
    <div class="max-w-4xl mx-auto px-4">
        <div class="flex justify-between items-center py-4">
            <a href="/" class="text-xl font-bold text-gray-900">My Dev Blog</a>

            <!-- 메뉴 항목을 가로 정렬 -->
            <div class="flex items-center space-x-4">
                <a href="/posts" class="text-sm text-gray-700 hover:text-blue-600">📚 개발 게시글 목록</a>
                <a href="/about" class="text-sm text-gray-700 hover:text-blue-600">👨‍💻 소개</a>
                <a href="/qna" class="text-sm text-gray-700 hover:text-blue-600">📩 Q&A</a>

                <!-- 관리자만 "새 게시글 작성" 버튼 보이기 -->
                <a href="/post" class="text-sm text-gray-700 hover:text-blue-600" sec:authorize="hasRole('ADMIN')">✍️ 새 게시글</a>

                <!-- 관리자만 "카테고리 관리" 버튼 보이기 -->
                <a href="/category" class="text-sm text-gray-700 hover:text-blue-600" sec:authorize="hasRole('ADMIN')">📂 카테고리 관리</a>

                <!-- 관리자만 "마이페이지" 버튼 보이기 -->
                <a href="/admin" class="text-sm text-gray-700 hover:text-blue-600" sec:authorize="hasRole('ADMIN')">👑 관리자</a>

                <!-- 로그인 / 로그아웃 버튼 -->
                <a href="/logout" class="text-sm text-gray-700 hover:text-red-600" sec:authorize="isAuthenticated()">🚪 로그아웃</a>
                <a href="/loginForm" class="text-sm text-gray-700 hover:text-blue-600" sec:authorize="isAnonymous()">🔑 로그인</a>
            </div>
        </div>
    </div>
</nav>

<!-- 게시글 상세보기 섹션 -->
<section class="max-w-4xl mx-auto mt-10 px-6">
    <article class="bg-white rounded-lg shadow-lg p-6">
        <h2 class="text-3xl font-semibold text-gray-900 mb-4" th:text="${post.title}">게시글 제목</h2>
        <div class="mb-6">
            <img th:src="${post.imageUrl}" alt="게시글 이미지" class="w-full h-72 object-contain rounded-lg"
                 onerror="this.onerror=null;this.src='/images/default-image.png';">
        </div>
        <div class="text-lg text-gray-700 mb-4" style="overflow-wrap: break-word; white-space: pre-wrap;">
            <div th:utext="${post.content}">게시글 내용</div>
        </div>
        <div class="text-sm text-gray-500 mb-2" style="overflow-wrap: break-word;">
            <p>작성자: <span th:text="${post.author}">작성자 이름</span></p>
        </div>
        <div class="text-sm text-gray-500 mb-2" style="overflow-wrap: break-word;">
            <p>작성일: <span th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}">작성일</span></p>
        </div>
        <a href="/posts" class="text-blue-600 hover:underline">돌아가기</a>
    </article>
</section>

<!-- 댓글 섹션 -->
<section class="max-w-4xl mx-auto mt-10 px-6">
    <h3 class="text-2xl font-semibold mb-4">💬 댓글</h3>

    <!-- 댓글 작성 폼 -->
    <form th:action="@{/post/{id}/comment(id=${post.id})}" method="post" class="mb-6 bg-white p-4 rounded-lg shadow">
        <textarea name="content" rows="3" placeholder="댓글을 입력하세요..." required
                  class="w-full p-2 border rounded-md"></textarea>
        <button type="submit"
                class="mt-2 px-4 py-2 bg-blue-500 text-white rounded-md hover:bg-blue-700">댓글 등록</button>
    </form>

    <!-- 댓글 리스트 -->
    <div class="bg-white rounded-lg shadow-lg p-4">
        <ul>
            <li th:each="comment : ${comments}" class="border-b border-gray-300 py-2" style="overflow-wrap: break-word;">
                <strong th:text="${comment.user.username}" class="text-blue-600"></strong>:
                <span th:text="${comment.content}"></span>
                <small class="text-gray-500 ml-2"
                       th:text="${#temporals.format(comment.createdAt, 'yyyy-MM-dd HH:mm')}"></small>
            </li>
        </ul>
    </div>
</section>

<!-- 푸터 -->
<footer class="bg-gray-800 text-white text-center py-6 mt-16">
    <p class="text-sm">© 2025 My Dev Blog. All rights reserved.</p>
    <p class="text-sm">📩 문의: <a href="mailto:fghjk000@naver.com" class="underline">fghjk000@naver.com</a></p>
</footer>

</body>
</html>
