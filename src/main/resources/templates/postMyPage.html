<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 게시글 관리</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900">

<!-- 네비게이션 바 -->
<nav class="bg-white shadow-md">
    <div class="max-w-4xl mx-auto px-4">
        <div class="flex justify-between items-center py-4">
            <a href="/" class="text-xl font-bold text-gray-900">My Dev Blog</a>

            <!-- 메뉴 항목을 가로 정렬 -->
            <div class="flex items-center space-x-4">
                <a href="/posts" class="text-sm text-gray-700 hover:text-blue-600">📚 개발 게시글 목록</a>
                <a href="/about" class="text-sm text-gray-700 hover:text-blue-600">👨‍💻 소개</a>
                <a href="/qna" class="text-sm text-gray-700 hover:text-blue-600">📩 Q&A</a>

                <!-- 관리자만 "새 게시글 작성" 버튼 보이기 -->
                <a href="/post" class="text-sm text-gray-700 hover:text-blue-600" sec:authorize="hasRole('ADMIN')">✍️ 새 게시글</a>

                <!-- 관리자만 "카테고리 관리" 버튼 보이기 -->
                <a href="/category" class="text-sm text-gray-700 hover:text-blue-600" sec:authorize="hasRole('ADMIN')">📂 카테고리 관리</a>

                <!-- 관리자만 "마이페이지" 버튼 보이기 -->
                <a href="/admin" class="text-sm text-gray-700 hover:text-blue-600" sec:authorize="hasRole('ADMIN')">👑 관리자</a>

                <!-- 로그인 / 로그아웃 버튼 -->
                <a href="/logout" class="text-sm text-gray-700 hover:text-red-600" sec:authorize="isAuthenticated()">🚪 로그아웃</a>
                <a href="/loginForm" class="text-sm text-gray-700 hover:text-blue-600" sec:authorize="isAnonymous()">🔑 로그인</a>
            </div>
        </div>
    </div>
</nav>
<!-- 관리자 게시글 관리 페이지 -->
<section class="max-w-4xl mx-auto mt-10 px-6">
    <h2 class="text-3xl font-bold text-gray-800 mb-6">🛠 관리자 게시글 관리</h2>

    <table class="min-w-full bg-white border border-gray-200 rounded-lg shadow-md overflow-hidden">
        <thead>
        <tr class="bg-gray-100 text-gray-700">
            <th class="py-3 px-4 border">제목</th>
            <th class="py-3 px-4 border">작성자</th>
            <th class="py-3 px-4 border">작성일</th>
            <th class="py-3 px-4 border">관리</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="post : ${posts}" class="border-t">
            <td class="py-3 px-4 border" th:text="${post.title}"></td>
            <td class="py-3 px-4 border" th:text="${post.author}"></td>
            <td class="py-3 px-4 border" th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd')}"></td>
            <td class="py-3 px-4 border flex space-x-2">
                <a th:href="@{/post/update/{id}(id=${post.id})}" class="bg-blue-500 text-white px-3 py-1 rounded hover:bg-blue-600">수정</a>
                <form th:action="@{/post/delete/{id}(id=${post.id})}" method="post" class="inline"
                      onsubmit="return confirm('정말 삭제하시겠습니까?');">
                    <input type="hidden" name="_method" value="delete">
                    <button type="submit" class="bg-red-500 text-white px-3 py-1 rounded hover:bg-red-600">삭제</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</section>

<!-- 푸터 -->
<footer class="bg-gray-800 text-white text-center py-6 mt-16">
    <p class="text-sm">© 2025 My Dev Blog. All rights reserved.</p>
</footer>

</body>
</html>
