<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>회원가입 | My Dev Blog</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900">

<!-- 네비게이션 바 -->
<nav class="bg-white shadow-md">
  <div class="max-w-4xl mx-auto px-4">
    <div class="flex justify-between items-center py-4">
      <a href="/" class="text-2xl font-bold text-gray-900">My Dev Blog</a>
      <div>
        <a href="/posts" class="text-gray-700 px-4 hover:text-blue-600">📚 개발 게시글 목록</a>
        <a href="/about" class="text-gray-700 px-4 hover:text-blue-600">👨‍💻 소개</a>
        <a href="/qna" class="text-gray-700 px-4 hover:text-blue-600">📩 Q&A</a>

        <!-- 관리자만 "새 게시글 작성" 버튼 보이기 -->
        <div sec:authorize="hasRole('ADMIN')">
          <a href="/post" class="text-gray-700 px-4 hover:text-blue-600">✍️ 새 게시글</a>
        </div>

        <!-- 로그인 버튼 -->
        <a href="/loginForm" class="text-gray-700 px-4 hover:text-blue-600">🔑 로그인</a>
      </div>
    </div>
  </div>
</nav>

<!-- 회원가입 섹션 -->
<section class="max-w-md mx-auto mt-10 px-6 py-8 bg-white rounded-lg shadow-lg">
  <h2 class="text-3xl font-bold text-gray-800 text-center mb-6">회원가입</h2>

  <!-- 회원가입 폼 -->
  <form action="/join" method="POST" th:object="${userDto}">
    <div class="mb-4">
      <label for="username" class="block text-sm font-semibold text-gray-700">사용자 이름</label>
      <input type="text" name="username" id="username" placeholder="Username"
             class="w-full px-4 py-2 mt-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
             th:value="${userDto.username}" />
      <div th:if="${#fields.hasErrors('username')}" class="text-red-500 text-sm">
        <p th:errors="*{username}">사용자 이름 오류</p>
      </div>
    </div>

    <div class="mb-4">
      <label for="password" class="block text-sm font-semibold text-gray-700">비밀번호</label>
      <input type="password" name="password" id="password" placeholder="Password"
             class="w-full px-4 py-2 mt-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
             th:value="${userDto.password}" />
      <div th:if="${#fields.hasErrors('password')}" class="text-red-500 text-sm">
        <p th:errors="*{password}">비밀번호 오류</p>
      </div>
    </div>

    <div class="mb-4">
      <label for="email" class="block text-sm font-semibold text-gray-700">이메일</label>
      <input type="email" name="email" id="email" placeholder="Email"
             class="w-full px-4 py-2 mt-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
             th:value="${userDto.email}" />
      <div th:if="${#fields.hasErrors('email')}" class="text-red-500 text-sm">
        <p th:errors="*{email}">이메일 오류</p>
      </div>
    </div>

    <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition">회원가입</button>
  </form>

  <div class="mt-6 text-center">
    <p class="text-sm text-gray-600">계정이 있으신가요? <a href="/loginForm" class="text-blue-600 hover:text-blue-800">로그인</a></p>
  </div>
</section>

<!-- 푸터 -->
<footer class="bg-gray-800 text-white text-center py-6 mt-16 fixed bottom-0 left-0 w-full">
  <p class="text-sm">© 2025 My Dev Blog. All rights reserved.</p>
  <p class="text-sm">📩 문의: <a href="mailto:fghjk000@naver.com" class="underline">fghjk000@naver.com</a></p>
</footer>

</body>
</html>
