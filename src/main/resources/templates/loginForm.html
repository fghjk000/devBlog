<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 | My Dev Blog</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900">

<!-- 네비게이션 바 -->
<nav class="bg-white shadow-md">
    <div class="max-w-4xl mx-auto px-4">
        <div class="flex justify-between items-center py-4">
            <a href="/" class="text-2xl font-bold text-gray-900">My Dev Blog</a>
            <div>
                <a href="/posts" class="text-gray-700 px-4 hover:text-blue-600">📚 개발 게시글 목록</a>
                <a href="/about" class="text-gray-700 px-4 hover:text-blue-600">👨‍💻 소개</a>
                <a href="/qna" class="text-gray-700 px-4 hover:text-blue-600">📩 Q&A</a>
            </div>
        </div>
    </div>
</nav>

<!-- 로그인 섹션 -->
<section class="max-w-md mx-auto mt-10 px-6 py-8 bg-white rounded-lg shadow-lg">
    <h2 class="text-3xl font-bold text-gray-800 text-center mb-6">로그인</h2>

    <!-- 일반 로그인 폼 -->
    <form action="/login" method="post">
        <div class="mb-4">
            <label for="username" class="block text-sm font-semibold text-gray-700">사용자 이름</label>
            <input type="text" id="username" name="username" class="w-full px-4 py-2 mt-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" required>
        </div>

        <div class="mb-4">
            <label for="password" class="block text-sm font-semibold text-gray-700">비밀번호</label>
            <input type="password" id="password" name="password" class="w-full px-4 py-2 mt-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" required>
        </div>

        <div class="flex justify-between items-center mb-6">
            <div>
                <input type="checkbox" id="remember" name="remember" class="mr-2">
                <label for="remember" class="text-sm text-gray-600">로그인 상태 유지</label>
            </div>
            <a href="/forgot-password" class="text-sm text-blue-600 hover:text-blue-800">비밀번호를 잊으셨나요?</a>
        </div>

        <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition">로그인</button>
    </form>

    <!-- Google 로그인 버튼 -->
    <div class="mt-6 text-center">
        <p class="text-sm text-gray-600 mb-3">또는</p>
        <a href="/oauth2/authorization/google" class="w-full flex justify-center items-center bg-red-600 text-white py-2 rounded-lg hover:bg-red-700 transition">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" class="w-5 h-5 mr-2">
            Google 로그인
        </a>
    </div>

    <div class="mt-6 text-center">
        <p class="text-sm text-gray-600">계정이 없으신가요? <a href="/joinForm" class="text-blue-600 hover:text-blue-800">회원 가입</a></p>
    </div>
</section>

<!-- 푸터 -->
<footer class="bg-gray-800 text-white text-center py-6 mt-16 fixed bottom-0 left-0 w-full">
    <p class="text-sm">© 2025 My Dev Blog. All rights reserved.</p>
    <p class="text-sm">📩 문의: <a href="mailto:fghjk000@naver.com" class="underline">fghjk000@naver.com</a></p>
</footer>

</body>
</html>
